<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | ShieldGuard</title>
    <link rel="icon" type="image/svg+xml" href="assets/logo/logo.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#1E7A3A', secondary: '#F59E0B', darkbg: '#0F172A' } } } }
    </script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="antialiased bg-gray-50 dark:bg-darkbg min-h-screen flex flex-col">
    <!-- Navbar (Minimal) -->
    <nav class="w-full bg-white/90 dark:bg-darkbg/90 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 h-20 flex items-center">
        <div class="max-w-7xl mx-auto px-4 w-full flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3">
                <img src="assets/logo/logo.svg" alt="Logo" class="h-10">
                <span class="font-bold text-2xl dark:text-white">ShieldGuard</span>
            </a>
            <div class="flex items-center gap-4">
                <button class="theme-toggle text-gray-500 hover:text-primary"><i class="fas fa-moon dark:hidden"></i><i class="fas fa-sun hidden dark:block text-yellow-400"></i></button>
                <button class="dir-toggle text-gray-500 hover:text-primary"><i class="fas fa-language"></i></button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-2xl w-full text-center animate-fade-in bg-white dark:bg-gray-800 p-10 rounded-3xl shadow-2xl border border-gray-100 dark:border-gray-700">
            <div class="w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center mx-auto mb-6 text-primary">
                <i class="fas fa-rocket text-3xl"></i>
            </div>
            <h1 class="text-4xl md:text-5xl font-bold text-gray-900 dark:text-white mb-4">Something Big Is Coming</h1>
            <p class="text-gray-600 dark:text-gray-400 mb-10 text-lg">We are currently working hard on launching our new premium feature. Stay tuned!</p>
            
            <!-- Countdown Placeholder -->
            <div class="grid grid-cols-4 gap-4 mb-10 max-w-lg mx-auto">
                <div class="bg-gray-100 dark:bg-gray-700 p-4 rounded-xl">
                    <span class="block text-3xl font-bold dark:text-white">14</span>
                    <span class="text-xs text-gray-500 uppercase tracking-wider">Days</span>
                </div>
                <div class="bg-gray-100 dark:bg-gray-700 p-4 rounded-xl">
                    <span class="block text-3xl font-bold dark:text-white">08</span>
                    <span class="text-xs text-gray-500 uppercase tracking-wider">Hours</span>
                </div>
                <div class="bg-gray-100 dark:bg-gray-700 p-4 rounded-xl">
                    <span class="block text-3xl font-bold dark:text-white">45</span>
                    <span class="text-xs text-gray-500 uppercase tracking-wider">Mins</span>
                </div>
                <div class="bg-gray-100 dark:bg-gray-700 p-4 rounded-xl">
                    <span class="block text-3xl font-bold dark:text-white">30</span>
                    <span class="text-xs text-gray-500 uppercase tracking-wider">Secs</span>
                </div>
            </div>

            <!-- Notify Me -->
            <form class="flex flex-col sm:flex-row gap-3 max-w-md mx-auto mb-10" onsubmit="event.preventDefault(); alert('We will notify you!');">
                <input type="email" required placeholder="Enter your email" class="form-input flex-grow">
                <button type="submit" class="btn-primary whitespace-nowrap">Notify Me</button>
            </form>

            <!-- Socials -->
            <div class="flex justify-center gap-4">
                <a href="#" class="w-10 h-10 rounded-full bg-gray-100 dark:bg-gray-700 flex items-center justify-center text-gray-600 dark:text-gray-400 hover:bg-primary hover:text-white transition"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="w-10 h-10 rounded-full bg-gray-100 dark:bg-gray-700 flex items-center justify-center text-gray-600 dark:text-gray-400 hover:bg-primary hover:text-white transition"><i class="fab fa-twitter"></i></a>
                <a href="#" class="w-10 h-10 rounded-full bg-gray-100 dark:bg-gray-700 flex items-center justify-center text-gray-600 dark:text-gray-400 hover:bg-primary hover:text-white transition"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </main>

    <script src="assets/js/main.js"></script>
</body>
</html>
