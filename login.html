<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ShieldGuard</title>
    <link rel="icon" type="image/svg+xml" href="assets/logo/logo.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#1E7A3A', secondary: '#F59E0B', darkbg: '#0F172A' } } } }
    </script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="antialiased bg-gray-50 dark:bg-darkbg min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="absolute top-0 left-0 w-full p-4 flex justify-end items-center z-10 px-4 sm:px-6 lg:px-8">
        <div class="flex gap-4">
            <button class="theme-toggle text-gray-500 hover:text-primary transition" title="Toggle Dark/Light Mode">
                <i class="fas fa-moon dark:hidden text-xl"></i>
                <i class="fas fa-sun hidden dark:block text-yellow-400 text-xl"></i>
            </button>
            <button class="dir-toggle text-gray-500 hover:text-primary transition" title="Toggle LTR/RTL">
                <i class="fas fa-language text-xl"></i>
            </button>
        </div>
    </div>

    <div class="max-w-md w-full space-y-8 bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-xl border border-gray-100 dark:border-gray-700 animate-fade-in">
        <div class="text-center">
            <a href="index.html" class="inline-flex items-center gap-3 justify-center mb-2">
                <img src="assets/logo/logo.svg" alt="Logo" class="h-10">
                <span class="font-bold text-2xl dark:text-white">ShieldGuard</span>
            </a>
            <h2 class="mt-4 text-3xl font-bold text-gray-900 dark:text-white">Welcome Back</h2>
            <p class="mt-2 text-sm text-gray-600 dark:text-gray-400">Sign in to your customer portal</p>
        </div>
        
        <form class="mt-8 space-y-6" onsubmit="event.preventDefault(); alert('Login submitted!');">
            <div class="space-y-4">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Email address</label>
                    <input id="email" name="email" type="email" required class="form-input mt-1">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Password</label>
                    <div class="relative mt-1">
                        <input id="password" name="password" type="password" required class="form-input w-full pr-10">
                        <button type="button" class="toggle-password absolute inset-y-0 right-0 pr-3 flex items-center text-gray-500 hover:text-primary" data-target="password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded">
                    <label for="remember-me" class="ml-2 block text-sm text-gray-700 dark:text-gray-300">Remember me</label>
                </div>
                <div class="text-sm">
                    <a href="#" class="font-medium text-primary hover:text-hover">Forgot password?</a>
                </div>
            </div>

            <div>
                <button type="submit" class="w-full btn-primary justify-center">Sign in</button>
            </div>
            
            <div class="mt-6">
                <div class="relative">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300 dark:border-gray-600"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white dark:bg-gray-800 text-gray-500">Or continue with</span>
                    </div>
                </div>

                <div class="mt-6 grid grid-cols-3 gap-3">
                    <a href="#" class="w-full inline-flex justify-center py-2 px-4 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm bg-white dark:bg-gray-700 text-sm font-medium text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-600">
                        <i class="fab fa-google text-red-500 text-lg"></i>
                    </a>
                    <a href="#" class="w-full inline-flex justify-center py-2 px-4 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm bg-white dark:bg-gray-700 text-sm font-medium text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-600">
                        <i class="fab fa-facebook-f text-blue-600 text-lg"></i>
                    </a>
                    <a href="#" class="w-full inline-flex justify-center py-2 px-4 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm bg-white dark:bg-gray-700 text-sm font-medium text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-600">
                        <i class="fab fa-apple text-gray-900 dark:text-white text-lg"></i>
                    </a>
                </div>
            </div>
            
            <p class="mt-2 text-center text-sm text-gray-600 dark:text-gray-400">
                Don't have an account? <a href="signup.html" class="font-medium text-primary hover:text-hover">Sign up</a>
            </p>
        </form>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
