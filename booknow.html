<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Now | ShieldGuard</title>
    <link rel="icon" type="image/svg+xml" href="assets/logo/logo.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#1E7A3A', secondary: '#F59E0B', darkbg: '#0F172A' } } } }
    </script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="antialiased bg-gray-50 dark:bg-darkbg min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="absolute top-0 left-0 w-full p-4 flex justify-between items-center z-10 px-4 sm:px-6 lg:px-8">
        <a href="index.html" class="flex items-center gap-3">
            <img src="assets/logo/logo.svg" alt="ShieldGuard Logo" class="h-8 w-8">
            <span class="font-bold text-xl text-gray-900 dark:text-white tracking-tight font-poppins">ShieldGuard</span>
        </a>
        <div class="flex gap-4">
            <button class="theme-toggle text-gray-500 hover:text-primary transition" title="Toggle Dark/Light Mode">
                <i class="fas fa-moon dark:hidden text-xl"></i>
                <i class="fas fa-sun hidden dark:block text-yellow-400 text-xl"></i>
            </button>
            <button class="dir-toggle text-gray-500 hover:text-primary p-2 flex items-center justify-center transition" title="Toggle LTR/RTL">
                <span class="font-bold text-sm">LTR</span>
            </button>
        </div>
    </div>

    <div class="max-w-2xl w-full bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-xl border border-gray-100 dark:border-gray-700 animate-fade-in">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-gray-900 dark:text-white">Book an Appointment</h2>
            <p class="text-gray-600 dark:text-gray-400 mt-2">Schedule your service in minutes.</p>
        </div>
        
        <form class="space-y-6" onsubmit="event.preventDefault(); alert('Appointment requested successfully!');">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Service Selection -->
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Select Service</label>
                    <select class="form-input">
                        <option>General Home Protection</option>
                        <option>Termite Inspection/Treatment</option>
                        <option>Rodent Removal</option>
                        <option>Mosquito Control</option>
                        <option>Bed Bug Eradication</option>
                        <option>Commercial Audit</option>
                        <option>Other (Please specify in notes)</option>
                    </select>
                </div>

                <!-- Date & Time -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Preferred Date</label>
                    <input type="date" required class="form-input">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Preferred Time</label>
                    <select class="form-input">
                        <option>Morning (8AM - 12PM)</option>
                        <option>Afternoon (12PM - 4PM)</option>
                        <option>Evening (4PM - 8PM)</option>
                    </select>
                </div>

                <!-- Contact Details -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Full Name</label>
                    <input type="text" required class="form-input">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Phone Number</label>
                    <input type="tel" required class="form-input">
                </div>

                <!-- Address -->
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Service Address</label>
                    <input type="text" required placeholder="Street Address" class="form-input mb-2">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" placeholder="City" class="form-input">
                        <input type="text" placeholder="Zip Code" class="form-input">
                    </div>
                </div>

                <!-- Notes -->
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Additional Notes</label>
                    <textarea rows="3" placeholder="Any specific pest problems or gate codes?" class="form-input"></textarea>
                </div>
            </div>

            <button type="submit" class="w-full btn-primary justify-center text-lg py-3">Submit Request</button>
        </form>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
