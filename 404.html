<!DOCTYPE html>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#1E7A3A', secondary: '#F59E0B', darkbg: '#0F172A' } } } }

<body class="antialiased bg-gray-50 dark:bg-darkbg min-h-screen flex flex-col">

    <nav class="w-full bg-white/90 dark:bg-darkbg/90 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 h-20 flex items-center">
        <div class="max-w-7xl mx-auto px-4 w-full flex justify-between items-center">
